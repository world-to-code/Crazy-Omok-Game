name: Deploy

# main 브랜치에 push 하면 자동 빌드 후 EC2에 배포하고 서비스를 재시작한다.
on:
  push:
    branches: [main]
  workflow_dispatch: # 수동 실행도 허용

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    # EC2 가 ARM(Graviton, aarch64) 이라 ARM 러너에서 네이티브로 빌드한다.
    # (public 리포는 GitHub ARM 러너 무료)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      # ---------- 프론트엔드 빌드 ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      # ---------- Rust 정적(musl) 바이너리 빌드 (aarch64) ----------
      # musl 정적 링크 → glibc 버전과 무관. ARM 러너에서 aarch64 네이티브 빌드.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: cargo-${{ runner.os }}-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Build server (release, aarch64 musl)
        working-directory: server
        run: cargo build --release --target aarch64-unknown-linux-musl

      # ---------- 산출물 패키징 ----------
      - name: Package artifact
        run: |
          mkdir -p pkg/web
          cp server/target/aarch64-unknown-linux-musl/release/omok-server pkg/omok-server
          cp -r web/dist pkg/web/dist
          tar czf deploy.tar.gz -C pkg .

      # ---------- EC2로 전송 ----------
      - name: Copy artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: deploy.tar.gz
          target: /tmp/omok-deploy

      # ---------- 배포 + 서비스 재시작 ----------
      - name: Deploy and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            APP_DIR=/opt/omok
            mkdir -p "$APP_DIR/web"
            tar xzf /tmp/omok-deploy/deploy.tar.gz -C /tmp/omok-deploy

            # 실행 중 바이너리는 unlink 후 새로 배치(Text file busy 방지).
            rm -f "$APP_DIR/omok-server"
            install -m 755 /tmp/omok-deploy/omok-server "$APP_DIR/omok-server"

            # 프론트 정적 파일 교체
            rm -rf "$APP_DIR/web/dist"
            cp -r /tmp/omok-deploy/web/dist "$APP_DIR/web/dist"

            # 부팅 시 자동시작 등록(enable). 인스턴스 재시작 후에도 자동 기동.
            # (sudoers 에 enable 권한이 없으면 무시되고 배포는 계속됨)
            sudo systemctl enable omok 2>/dev/null || true

            # 서비스 재시작 (sudoers NOPASSWD 필요)
            sudo systemctl reset-failed omok || true
            sudo systemctl restart omok

            rm -rf /tmp/omok-deploy
            sleep 1
            sudo systemctl is-active omok
